<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corpogramme</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  font-family:'DM Sans',system-ui,sans-serif;
  background:#ffffff;
  color:#1a1a18;
  color-scheme:light;
}
#app{display:flex;flex-direction:column;height:100vh;font-size:13px;background:#ffffff;}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid rgba(0,0,0,0.15);flex-wrap:wrap;background:#ffffff;}
.div{width:0.5px;height:22px;background:rgba(0,0,0,0.3);flex-shrink:0;}
.pbtn{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:8px;border:none;font-weight:500;font-size:12px;color:#fff;letter-spacing:.02em;cursor:pointer;font-family:inherit;}
.ibtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:12px;background:#ffffff;color:#1a1a18;border:0.5px solid rgba(0,0,0,0.3);cursor:pointer;font-family:inherit;}
.ibtn.on{background:#E1F5EE;color:#085041;border-color:#1D9E75;}
select,input[type=number]{font-size:12px;padding:4px 6px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.3);background:#ffffff;color:#1a1a18;font-family:inherit;}
.ppanel{width:76px;min-width:76px;border-right:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;overflow-y:auto;padding:8px 4px;flex-shrink:0;}
.pitem{display:flex;flex-direction:column;align-items:center;padding:5px 2px;cursor:grab;border-radius:8px;margin-bottom:1px;border:0.5px solid transparent;user-select:none;transition:background .1s;}
.pitem:hover{background:#ffffff;border-color:rgba(0,0,0,0.15);}
.gwrap{flex:1;overflow:auto;}
.bhead{display:flex;align-items:center;position:sticky;top:0;background:#ffffff;z-index:10;border-bottom:1px solid rgba(0,0,0,0.3);}
.trow{display:flex;align-items:stretch;border-bottom:0.5px solid rgba(0,0,0,0.15);min-height:68px;transition:opacity .15s;}
.tlabel{width:140px;min-width:140px;display:flex;align-items:center;gap:6px;padding:0 8px;border-right:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;}
.cell{min-width:40px;width:40px;display:flex;align-items:center;justify-content:center;transition:background .08s;position:relative;}
.sbar{padding:5px 12px;border-top:0.5px solid rgba(0,0,0,0.15);font-size:11px;color:#888780;display:flex;gap:16px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PICS=[
  {id:"clap",   e:"👏",l:"Clap",        c:"#1D9E75"},
  {id:"snap",   e:"🫰",l:"Claquement",  c:"#185FA5"},
  {id:"stomp",  e:"🦶",l:"Frappe pied", c:"#D85A30"},
  {id:"chest",  e:"👕",l:"Poitrine",    c:"#9933AA"},
  {id:"thigh",  e:"🦵",l:"Cuisse",      c:"#BA7517"},
  {id:"silence",e:"🤫",l:"Silence",     c:"#888780"},
  {id:"voice",  e:"🎤",l:"Voix",        c:"#D4537E"},
  {id:"text",   e:"T",  l:"Texte",       c:"#4A6FA5"},
  {id:"custom1",e:"⭐",l:"Libre 1",     c:"#639922"},
  {id:"custom2",e:"🔶",l:"Libre 2",     c:"#E24B4A"},
];
const TSIG={
  "4/4":{label:"4/4", pulses:4, sbl:{debutant:1,intermediaire:2,confirme:4}},
  "3/4":{label:"3/4", pulses:3, sbl:{debutant:1,intermediaire:2,confirme:4}},
  "2/4":{label:"2/4", pulses:2, sbl:{debutant:1,intermediaire:2,confirme:4}},
  "6/8":{label:"6/8", pulses:2, sbl:{debutant:1,intermediaire:3,confirme:6}},
  "3/8":{label:"3/8", pulses:1, sbl:{debutant:1,intermediaire:3,confirme:6}},
  "12/8":{label:"12/8",pulses:4,sbl:{debutant:1,intermediaire:3,confirme:6}},
};
const LVLS=[["debutant","Débutant"],["intermediaire","Intermédiaire"],["confirme","Confirmé"]];

/* ── Audio ── */
function getAC(){
  if(!window._AC||window._AC.state==="closed")
    window._AC=new(window.AudioContext||window.webkitAudioContext)();
  if(window._AC.state==="suspended")window._AC.resume();
  return window._AC;
}
function noise(ac,d){
  const n=Math.ceil(ac.sampleRate*d),b=ac.createBuffer(1,n,ac.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<n;i++)dd[i]=Math.random()*2-1;return b;
}
function playClap(g=1){const ac=getAC(),t=ac.currentTime,m=ac.createGain();m.gain.setValueAtTime(g*.7,t);m.connect(ac.destination);[0,.012].forEach(o=>{const s=ac.createBufferSource();s.buffer=noise(ac,.15);const e=ac.createGain();e.gain.setValueAtTime(0,t+o);e.gain.linearRampToValueAtTime(1,t+o+.003);e.gain.exponentialRampToValueAtTime(.001,t+o+.12);const h=ac.createBiquadFilter();h.type="highpass";h.frequency.value=1200;s.connect(h);h.connect(e);e.connect(m);s.start(t+o);s.stop(t+o+.15);});}
function playSnap(g=1){const ac=getAC(),t=ac.currentTime,m=ac.createGain();m.gain.setValueAtTime(g*.6,t);m.connect(ac.destination);const s=ac.createBufferSource();s.buffer=noise(ac,.05);const e=ac.createGain();e.gain.setValueAtTime(1,t);e.gain.exponentialRampToValueAtTime(.001,t+.04);const bp=ac.createBiquadFilter();bp.type="bandpass";bp.frequency.value=3500;bp.Q.value=1.5;s.connect(bp);bp.connect(e);e.connect(m);s.start(t);s.stop(t+.06);}
function playKick(g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="sine";o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(40,t+.12);const e=ac.createGain();e.gain.setValueAtTime(g*.9,t);e.gain.exponentialRampToValueAtTime(.001,t+.25);o.connect(e);e.connect(ac.destination);o.start(t);o.stop(t+.28);const s=ac.createBufferSource();s.buffer=noise(ac,.01);const ce=ac.createGain();ce.gain.setValueAtTime(g*.4,t);ce.gain.exponentialRampToValueAtTime(.001,t+.01);s.connect(ce);ce.connect(ac.destination);s.start(t);s.stop(t+.015);}
function playChest(g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="sine";o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(60,t+.15);const e=ac.createGain();e.gain.setValueAtTime(g*.7,t);e.gain.exponentialRampToValueAtTime(.001,t+.3);const s=ac.createBufferSource();s.buffer=noise(ac,.02);const ne=ac.createGain();ne.gain.setValueAtTime(g*.2,t);ne.gain.exponentialRampToValueAtTime(.001,t+.02);const lp=ac.createBiquadFilter();lp.type="lowpass";lp.frequency.value=400;s.connect(lp);lp.connect(ne);ne.connect(ac.destination);o.connect(e);e.connect(ac.destination);o.start(t);o.stop(t+.35);s.start(t);s.stop(t+.025);}
function playThigh(g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="sine";o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(80,t+.08);const e=ac.createGain();e.gain.setValueAtTime(g*.6,t);e.gain.exponentialRampToValueAtTime(.001,t+.18);const s=ac.createBufferSource();s.buffer=noise(ac,.03);const ne=ac.createGain();ne.gain.setValueAtTime(g*.35,t);ne.gain.exponentialRampToValueAtTime(.001,t+.03);const bp=ac.createBiquadFilter();bp.type="bandpass";bp.frequency.value=800;bp.Q.value=1;s.connect(bp);bp.connect(ne);ne.connect(ac.destination);o.connect(e);e.connect(ac.destination);o.start(t);o.stop(t+.2);s.start(t);s.stop(t+.04);}
function playVoice(g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="triangle";o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(300,t+.08);const e=ac.createGain();e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(g*.5,t+.01);e.gain.exponentialRampToValueAtTime(.001,t+.1);const v=ac.createOscillator();v.type="sine";v.frequency.value=5;const vg=ac.createGain();vg.gain.value=8;v.connect(vg);vg.connect(o.frequency);o.connect(e);e.connect(ac.destination);v.start(t);v.stop(t+.12);o.start(t);o.stop(t+.12);}
function playC1(g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="square";o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(600,t+.04);const e=ac.createGain();e.gain.setValueAtTime(g*.3,t);e.gain.exponentialRampToValueAtTime(.001,t+.08);o.connect(e);e.connect(ac.destination);o.start(t);o.stop(t+.1);}
function playC2(g=1){const ac=getAC(),t=ac.currentTime;const s=ac.createBufferSource();s.buffer=noise(ac,.08);const e=ac.createGain();e.gain.setValueAtTime(g*.4,t);e.gain.exponentialRampToValueAtTime(.001,t+.07);const h=ac.createBiquadFilter();h.type="highpass";h.frequency.value=5000;s.connect(h);h.connect(e);e.connect(ac.destination);s.start(t);s.stop(t+.09);}
function playTick(isPulse,isBar,g=1){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type="sine";o.frequency.value=isBar?1200:isPulse?900:600;const e=ac.createGain();e.gain.setValueAtTime(g*(isBar?.5:isPulse?.3:.12),t);e.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(e);e.connect(ac.destination);o.start(t);o.stop(t+.05);}
const SFX={clap:playClap,snap:playSnap,stomp:playKick,chest:playChest,thigh:playThigh,voice:playVoice,silence:null,custom1:playC1,custom2:playC2,text:null};

/* ── State ── */
const S={
  tracks:[{id:1,name:"Mains",color:"#1D9E75"},{id:2,name:"Pieds",color:"#D85A30"},{id:3,name:"Corps",color:"#185FA5"}],
  cells:{}, cellTexts:{}, tsig:"4/4", level:"debutant", bpm:90,
  playing:false, beat:0, loop:true, sound:true, metro:true,
  muted:{}, bars:1, nextId:4, editing:null, editingCell:null,
  dragPic:null, dragCell:null, dragText:undefined
};
let animId=null, t0=null, prevBeat=-1;

function ck(tid,b){return tid+"-"+b;}
function sig(){return TSIG[S.tsig];}
function sdv(){return sig().sbl[S.level];}
function cpb(){return sig().pulses*sdv();}
function tb(){return cpb()*S.bars;}

function fireSounds(idx){
  if(!S.sound)return;
  const c=cpb(),sv=sdv(),pos=idx%c,si=pos%sv,isPulse=si===0,isBar=pos===0;
  if(S.metro)playTick(isPulse,isBar,.8);
  S.tracks.forEach(tr=>{
    if(S.muted[tr.id])return;
    const p=S.cells[ck(tr.id,idx)];
    if(p&&p!=="silence"&&SFX[p])SFX[p](.85);
  });
}
function tickFn(){
  const sv=sdv(),spc=(60/S.bpm)/sv,el2=(performance.now()-t0)/1000,beat=Math.floor(el2/spc),total=tb();
  if(beat>=total){
    if(S.loop){t0=performance.now();prevBeat=-1;S.beat=0;}
    else{stopPB();return;}
  } else {
    const nb=beat%total;
    if(nb!==prevBeat){prevBeat=nb;fireSounds(nb);S.beat=nb;fastUpdate(nb);}
  }
  animId=requestAnimationFrame(tickFn);
}
function startPB(){getAC();S.playing=true;t0=performance.now();prevBeat=-1;render();animId=requestAnimationFrame(tickFn);}
function stopPB(){S.playing=false;cancelAnimationFrame(animId);S.beat=0;t0=null;prevBeat=-1;render();}

function fastUpdate(beat){
  const c=cpb(),sv=sdv();
  document.querySelectorAll(".bcol").forEach((el,i)=>{
    const pos=i%c,si2=pos%sv,isPulse=si2===0,isCur=i===beat;
    el.style.background=isCur?"#1D9E75":isPulse?"#E1F5EE":"transparent";
    el.style.color=isCur?"#fff":isPulse?"#085041":si2===Math.floor(sv/2)&&!isPulse?"#5f5e5a":"#888780";
  });
  document.querySelectorAll(".tcell").forEach(el=>{
    const i=+el.dataset.b,tid=+el.dataset.t,isCur=i===beat&&S.playing;
    const tr=S.tracks.find(t=>t.id===tid);
    if(!tr)return;
    const pos=i%c,si2=pos%sv,isPulse=si2===0;
    el.style.background=isCur?tr.color+"28":isPulse?"#f5f4f0":"transparent";
    const bar=el.querySelector(".bbar");
    if(bar)bar.style.display=isCur?"block":"none";
  });
}

/* ── Render ── */
function render(){
  const app=document.getElementById("app");
  const total=tb(),c=cpb(),sv=sdv();
  app.innerHTML="";

  /* toolbar */
  const tbar=mk("div","toolbar");

  /* titre */
  const titre=mk("span");titre.style.cssText="font-size:16px;font-weight:600;color:#1D9E75;letter-spacing:-.02em;margin-right:6px";titre.textContent="Corpogramme";
  tbar.appendChild(titre);
  tbar.appendChild(mkDiv());

  /* play */
  const btnPlay=mk("button","pbtn");btnPlay.style.background=S.playing?"#D85A30":"#1D9E75";
  btnPlay.innerHTML=`<i class="ti ti-${S.playing?"player-stop":"player-play"}" style="font-size:14px" aria-hidden="true"></i>`;
  btnPlay.appendChild(document.createTextNode(S.playing?" Stop":" Lecture"));
  btnPlay.addEventListener("click",()=>S.playing?stopPB():startPB());
  tbar.appendChild(btnPlay);

  /* loop */
  const btnLoop=mk("button","ibtn"+(S.loop?" on":""));
  btnLoop.innerHTML=`<i class="ti ti-repeat" style="font-size:14px" aria-hidden="true"></i>`;
  btnLoop.appendChild(document.createTextNode("Boucle"));
  btnLoop.addEventListener("click",()=>{S.loop=!S.loop;render();});
  tbar.appendChild(btnLoop);

  /* son */
  const btnSound=mk("button","ibtn"+(S.sound?" on":""));
  btnSound.innerHTML=`<i class="ti ti-${S.sound?"volume":"volume-off"}" style="font-size:14px" aria-hidden="true"></i>`;
  btnSound.appendChild(document.createTextNode(S.sound?" Son":" Muet"));
  btnSound.addEventListener("click",()=>{S.sound=!S.sound;render();});
  tbar.appendChild(btnSound);

  /* clear */
  const btnClear=mk("button","ibtn");btnClear.title="Réinitialiser";
  btnClear.innerHTML=`<i class="ti ti-trash" style="font-size:14px" aria-hidden="true"></i>`;
  btnClear.addEventListener("click",()=>{S.cells={};S.cellTexts={};stopPB();render();});
  tbar.appendChild(btnClear);
  tbar.appendChild(mkDiv());

  /* métronome + bpm */
  const bpmWrap=mk("div");bpmWrap.style.cssText="display:flex;align-items:center;gap:5px";
  const btnMetro=mk("button");
  btnMetro.style.cssText=`background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:${S.metro?"#1D9E75":"#888780"};opacity:${S.metro?1:.4}`;
  btnMetro.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22H6.5a2 2 0 0 1-1.94-1.5L2.06 8.5A2 2 0 0 1 4 6h16a2 2 0 0 1 1.94 2.5L19.44 20.5A2 2 0 0 1 17.5 22H12z"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="13" x2="16" y2="9"/></svg>`;
  btnMetro.addEventListener("click",()=>{S.metro=!S.metro;render();});
  bpmWrap.appendChild(btnMetro);
  const inBpm=mk("input");inBpm.type="number";inBpm.min=40;inBpm.max=240;inBpm.value=S.bpm;
  inBpm.style.cssText="width:52px;text-align:center;padding:4px";
  inBpm.addEventListener("change",e=>{S.bpm=Math.max(40,Math.min(240,+e.target.value));});
  bpmWrap.appendChild(inBpm);
  const bpmLbl=mk("span");bpmLbl.style.cssText="font-size:11px;color:#888780";bpmLbl.textContent="bpm";
  bpmWrap.appendChild(bpmLbl);
  tbar.appendChild(bpmWrap);
  tbar.appendChild(mkDiv());

  /* selects */
  const selWrap=mk("div");selWrap.style.cssText="display:flex;align-items:center;gap:5px";
  const icoMusic=mk("i","ti ti-music");icoMusic.style.cssText="font-size:13px;color:#5f5e5a";icoMusic.setAttribute("aria-hidden","true");
  selWrap.appendChild(icoMusic);
  const selTs=mk("select");
  Object.keys(TSIG).forEach(k=>{const o=mk("option");o.value=k;o.textContent=TSIG[k].label;if(k===S.tsig)o.selected=true;selTs.appendChild(o);});
  selTs.addEventListener("change",e=>{if(S.playing)stopPB();S.tsig=e.target.value;render();});
  selWrap.appendChild(selTs);
  const selLv=mk("select");
  LVLS.forEach(([v,l])=>{const o=mk("option");o.value=v;o.textContent=l;if(v===S.level)o.selected=true;selLv.appendChild(o);});
  selLv.addEventListener("change",e=>{if(S.playing)stopPB();S.level=e.target.value;render();});
  selWrap.appendChild(selLv);
  const selBars=mk("select");
  [1,2,4,8,12,16].forEach(b=>{const o=mk("option");o.value=b;o.textContent=b+" mes.";if(b===S.bars)o.selected=true;selBars.appendChild(o);});
  selBars.addEventListener("change",e=>{S.bars=+e.target.value;render();});
  selWrap.appendChild(selBars);
  tbar.appendChild(selWrap);
  app.appendChild(tbar);

  /* body */
  const body=mk("div");body.style.cssText="display:flex;flex:1;overflow:hidden;min-height:0";

  /* panel pictos */
  const pp=mk("div","ppanel");
  const ppLbl=mk("div");ppLbl.style.cssText="font-size:9px;font-weight:500;color:#888780;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;padding-left:4px";ppLbl.textContent="Pictos";
  pp.appendChild(ppLbl);
  PICS.forEach(p=>{
    const d=mk("div","pitem");
    d.draggable=true;
    /* ── FIX DRAG : ondragstart attribut direct, pas addEventListener ── */
    d.ondragstart=function(e){
      S.dragPic=p.id;S.dragCell=null;
      e.dataTransfer.effectAllowed="copy";
      e.dataTransfer.setData("text/plain",p.id);
    };
    const eSpan=mk("span");
    if(p.id==="text"){
      eSpan.style.cssText="font-size:22px;font-weight:800;color:#4A6FA5;line-height:1;font-family:'DM Sans',system-ui,sans-serif";
    } else {
      eSpan.style.fontSize="22px";
    }
    eSpan.textContent=p.e;
    const lSpan=mk("span");lSpan.style.cssText="font-size:9px;color:#888780;margin-top:2px;text-align:center;line-height:1.2;pointer-events:none";lSpan.textContent=p.l;
    d.appendChild(eSpan);d.appendChild(lSpan);
    pp.appendChild(d);
  });
  body.appendChild(pp);

  /* grille */
  const gw=mk("div","gwrap");
  const gi=mk("div");gi.style.minWidth=Math.max(560,140+total*40+24)+"px";

  /* header beats */
  const bh=mk("div","bhead");
  const bhLbl=mk("div");bhLbl.style.cssText="width:140px;min-width:140px;font-size:10px;color:#888780;padding:6px 12px;border-right:0.5px solid rgba(0,0,0,0.15)";bhLbl.textContent="Piste";
  bh.appendChild(bhLbl);
  for(let i=0;i<total;i++){
    const pos=i%c,bar=Math.floor(i/c)+1,pi=Math.floor(pos/sv),si2=pos%sv;
    const isPulse=si2===0,isMid=!isPulse&&si2===Math.floor(sv/2),isBarS=pos===0;
    const isCur=i===S.beat&&S.playing;
    const label=isPulse?`${bar}.${pi+1}`:isMid?"+":"·";
    const col=mk("div","bcol");col.dataset.i=i;
    col.style.cssText=`min-width:40px;width:40px;text-align:center;font-size:${isPulse?10:isMid?9:8}px;font-weight:${isPulse?600:400};padding:5px 0;border-left:${isBarS?"2px solid rgba(0,0,0,0.4)":isPulse?"1px solid rgba(0,0,0,0.3)":isMid?"0.5px solid rgba(0,0,0,0.3)":"0.5px solid rgba(0,0,0,0.15)"};background:${isCur?"#1D9E75":isPulse?"#E1F5EE":"transparent"};color:${isCur?"#fff":isPulse?"#085041":isMid?"#5f5e5a":"#888780"}`;
    col.textContent=label;
    bh.appendChild(col);
  }
  const bhPad=mk("div");bhPad.style.cssText="width:32px;min-width:32px";bh.appendChild(bhPad);
  gi.appendChild(bh);

  /* pistes */
  S.tracks.forEach(track=>{
    const muted=!!S.muted[track.id];
    const row=mk("div","trow");row.style.opacity=muted?.45:1;

    /* label piste — tout construit par DOM, zéro innerHTML pour éviter d'écraser les listeners */
    const lbl=mk("div","tlabel");

    const colorBar=mk("div");colorBar.style.cssText=`width:3px;height:32px;border-radius:2px;background:${track.color};flex-shrink:0`;
    lbl.appendChild(colorBar);

    if(S.editing===track.id){
      const inp=mk("input");inp.type="text";inp.value=track.name;
      inp.style.cssText=`font-size:12px;font-weight:500;padding:2px 4px;border-radius:4px;border:1px solid ${track.color};background:#fff;color:#1a1a18;width:62px;flex:1`;
      inp.addEventListener("blur",e=>{S.tracks=S.tracks.map(t=>t.id===track.id?{...t,name:e.target.value||t.name}:t);S.editing=null;render();});
      inp.addEventListener("keydown",e=>{if(e.key==="Enter")e.target.blur();});
      lbl.appendChild(inp);
      setTimeout(()=>inp.focus(),10);
    } else {
      const ns=mk("span");ns.textContent=track.name;
      ns.style.cssText="font-size:12px;font-weight:500;color:#1a1a18;cursor:text;flex:1;user-select:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
      ns.addEventListener("dblclick",()=>{S.editing=track.id;render();});
      lbl.appendChild(ns);
    }

    /* bouton mute */
    const mb=mk("button");
    mb.textContent="M";
    mb.style.cssText=`flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:0.5px solid ${muted?track.color:"rgba(0,0,0,0.3)"};background:${muted?track.color:"transparent"};font-size:9px;font-weight:700;color:${muted?"#fff":"#888780"};letter-spacing:.02em;padding:0;cursor:pointer;font-family:inherit`;
    mb.addEventListener("click",()=>{S.muted={...S.muted,[track.id]:!muted};render();});
    lbl.appendChild(mb);

    /* bouton supprimer — listener direct sur l'élément DOM */
    const db=mk("button");
    db.style.cssText="background:none;border:none;cursor:pointer;padding:2px;color:#888780;display:flex;align-items:center;flex-shrink:0;font-family:inherit";
    db.style.opacity=S.tracks.length<=1?"0.2":"1";
    const ico=mk("i","ti ti-x");ico.style.fontSize="12px";ico.setAttribute("aria-hidden","true");
    db.appendChild(ico);
    db.addEventListener("click",()=>{
      if(S.tracks.length<=1)return;
      S.tracks=S.tracks.filter(t=>t.id!==track.id);
      const nc={};const nt={};
      Object.keys(S.cells).forEach(k=>{if(!k.startsWith(track.id+"-"))nc[k]=S.cells[k];});
      Object.keys(S.cellTexts).forEach(k=>{if(!k.startsWith(track.id+"-"))nt[k]=S.cellTexts[k];});
      S.cells=nc;S.cellTexts=nt;
      render();
    });
    lbl.appendChild(db);
    row.appendChild(lbl);

    /* cellules */
    for(let i=0;i<total;i++){
      const key=ck(track.id,i),picId=S.cells[key],pic=PICS.find(p=>p.id===picId);
      const pos=i%c,si2=pos%sv,isPulse=si2===0,isMid=!isPulse&&si2===Math.floor(sv/2),isBarS=pos===0;
      const isCur=i===S.beat&&S.playing;

      const cell=mk("div","cell tcell");cell.dataset.b=i;cell.dataset.t=track.id;
      cell.style.cssText=`min-width:40px;width:40px;border-left:${isBarS?"2px solid rgba(0,0,0,0.4)":isPulse?"1px solid rgba(0,0,0,0.3)":isMid?"0.5px solid rgba(0,0,0,0.3)":"0.5px solid rgba(0,0,0,0.15)"};display:flex;align-items:center;justify-content:center;background:${isCur?track.color+"28":isPulse?"#f5f4f0":"transparent"};position:relative;cursor:${pic?"grab":"default"}`;

      const bbar=mk("div","bbar");bbar.style.cssText=`position:absolute;top:0;left:0;right:0;height:2px;background:${track.color};display:${isCur?"block":"none"}`;
      cell.appendChild(bbar);

      if(pic){
        const pd=mk("div");pd.draggable=true;pd.title="Double-clic pour effacer";
        pd.style.cssText="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;padding:2px;width:100%;height:100%";
        if(picId==="text"){
          if(S.editingCell===key){
            /* mode édition inline */
            const inp=mk("input");inp.type="text";
            inp.value=S.cellTexts[key]||"";
            inp.style.cssText="width:34px;font-size:8px;font-weight:700;color:#4A6FA5;text-align:center;text-transform:uppercase;border:none;border-bottom:1px solid #4A6FA5;background:transparent;outline:none;padding:1px 0;font-family:'DM Sans',system-ui,sans-serif";
            inp.setAttribute("draggable","false");
            const commit=()=>{
              const val=inp.value.toUpperCase();
              const nt={...S.cellTexts};
              if(val){nt[key]=val;}else{const nc={...S.cells};delete nc[key];delete nt[key];S.cells=nc;}
              S.cellTexts=nt;S.editingCell=null;render();
            };
            inp.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key==="Escape")e.target.blur();e.stopPropagation();});
            inp.addEventListener("blur",commit);
            inp.addEventListener("input",e=>{e.target.value=e.target.value.toUpperCase();});
            inp.addEventListener("mousedown",e=>e.stopPropagation());
            inp.addEventListener("click",e=>e.stopPropagation());
            pd.appendChild(inp);
            pd.draggable=false;
            setTimeout(()=>{inp.focus();inp.select();},10);
          } else {
            const txt=S.cellTexts[key]||"";
            const len=txt.length||1;
            /* taille adaptée pour tenir sur une ligne dans ~36px de large
               on part de 11px pour 1 car, on réduit progressivement */
            const fs=len<=2?11:len<=3?10:len<=4?9:len<=5?8:len<=7?7:6;
            const tSpan=mk("span");tSpan.style.cssText=`font-size:${fs}px;font-weight:700;color:#4A6FA5;text-align:center;line-height:1.1;max-width:36px;pointer-events:none;text-transform:uppercase;white-space:nowrap;overflow:hidden`;tSpan.textContent=txt||"T";
            pd.appendChild(tSpan);
          }
        } else {
          const eSpan=mk("span");eSpan.style.fontSize="24px";eSpan.textContent=pic.e;eSpan.style.pointerEvents="none";
          pd.appendChild(eSpan);
        }
        pd.ondragstart=function(e){
          if(S.editingCell===key)return;
          S.dragPic=picId;S.dragCell=key;
          if(picId==="text")S.dragText=S.cellTexts[key]||"";
          e.dataTransfer.effectAllowed="move";
          e.dataTransfer.setData("text/plain",picId);
        };
        pd.addEventListener("dblclick",()=>{
          if(picId==="text"){S.editingCell=key;render();return;}
          const n={...S.cells};delete n[key];
          const nt={...S.cellTexts};delete nt[key];
          S.cells=n;S.cellTexts=nt;render();
        });
        cell.appendChild(pd);
      } else {
        const dot=mk("span");dot.textContent="·";dot.style.cssText="font-size:16px;color:rgba(0,0,0,0.3);opacity:.4;pointer-events:none";
        cell.appendChild(dot);
      }

      cell.ondragover=function(e){e.preventDefault();e.dataTransfer.dropEffect=S.dragCell?"move":"copy";};
      cell.ondrop=function(e){
        e.preventDefault();
        const pid=e.dataTransfer.getData("text/plain")||S.dragPic;
        if(!pid)return;
        const nc={...S.cells};
        const nt={...S.cellTexts};
        /* supprimer l'origine si c'est un déplacement */
        if(S.dragCell&&S.dragCell!==key){
          delete nc[S.dragCell];
          if(pid==="text"){delete nt[S.dragCell];}
        }
        if(pid==="text"){
          let finalText;
          if(S.dragCell){
            /* déplacement d'une cellule texte existante */
            finalText=S.dragText||"";
            nt[key]=finalText;
          } else {
            /* nouveau dépôt depuis le panel : activer l'édition inline */
            nt[key]="";
            nc[key]=pid;
            S.cells=nc;S.cellTexts=nt;S.dragPic=null;S.dragCell=null;S.dragText=undefined;
            S.editingCell=key;
            render();
            return;
          }
        }
        nc[key]=pid;
        S.cells=nc;S.cellTexts=nt;S.dragPic=null;S.dragCell=null;S.dragText=undefined;
        render();
      };
      row.appendChild(cell);
    }

    const pad=mk("div");pad.style.cssText="width:32px;min-width:32px";row.appendChild(pad);
    gi.appendChild(row);
  });

  /* ajouter piste */
  const ar=mk("div");ar.style.cssText="padding:8px 12px";
  const ab=mk("button","ibtn");
  ab.style.cssText="display:flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px dashed rgba(0,0,0,0.3);border-radius:8px;font-size:12px;background:transparent;color:#5f5e5a;cursor:pointer;font-family:inherit";
  const abIco=mk("i","ti ti-plus");abIco.style.fontSize="13px";abIco.setAttribute("aria-hidden","true");
  ab.appendChild(abIco);ab.appendChild(document.createTextNode(" Ajouter une piste"));
  ab.addEventListener("click",()=>{
    const cols=["#9933AA","#BA7517","#639922","#D4537E","#185FA5","#D85A30","#1D9E75"];
    S.tracks=[...S.tracks,{id:S.nextId,name:"Piste "+S.nextId,color:cols[S.nextId%cols.length]}];
    S.nextId++;render();
  });
  ar.appendChild(ab);gi.appendChild(ar);
  gw.appendChild(gi);body.appendChild(gw);
  app.appendChild(body);

  /* status bar */
  const sb=mk("div","sbar");
  [
    ["ti-drag-drop","Glisser un picto sur la grille"],
    ["ti-pointer","Double-clic pour effacer"],
    ["ti-pencil","Double-clic sur le nom pour renommer"],
    ["ti-volume-off","M pour muter une piste"],
  ].forEach(([ico,txt])=>{
    const s=mk("span");
    const i=mk("i","ti "+ico);i.style.cssText="font-size:12px;vertical-align:-1px;margin-right:3px";i.setAttribute("aria-hidden","true");
    s.appendChild(i);s.appendChild(document.createTextNode(txt));
    sb.appendChild(s);
  });
  app.appendChild(sb);
}

function mk(tag,cls){const e=document.createElement(tag||"div");if(cls)e.className=cls;return e;}
function mkDiv(){const d=mk("div","div");return d;}

render();
</script>
</body>
</html>
