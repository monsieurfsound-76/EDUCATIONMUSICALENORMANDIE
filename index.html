*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;font-size:16px;}body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#ffffff;color:#1a1a18;color-scheme:light;}
#app{display:flex;flex-direction:column;height:100vh;font-size:.8125rem;background:#ffffff;}
.toolbar{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-bottom:0.5px solid rgba(0,0,0,0.15);flex-wrap:wrap;background:#ffffff;}
.div{width:0.5px;height:1.375rem;background:rgba(0,0,0,0.3);flex-shrink:0;}
.pbtn{display:flex;align-items:center;gap:.3rem;padding:.3rem .875rem;border-radius:.5rem;border:none;font-weight:500;font-size:.75rem;color:#fff;letter-spacing:.02em;cursor:pointer;font-family:inherit;}
.ibtn{display:flex;align-items:center;gap:.3rem;padding:.3rem .625rem;border-radius:.5rem;font-size:.75rem;background:#ffffff;color:#1a1a18;border:0.5px solid rgba(0,0,0,0.3);cursor:pointer;font-family:inherit;}
.ibtn.on{background:#E1F5EE;color:#085041;border-color:#1D9E75;}
select,input[type=number]{font-size:.75rem;padding:.25rem .375rem;border-radius:.5rem;border:0.5px solid rgba(0,0,0,0.3);background:#ffffff;color:#1a1a18;font-family:inherit;}
.ppanel{width:4.75rem;min-width:4.75rem;border-right:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;overflow-y:auto;padding:.5rem .25rem;flex-shrink:0;}
.pitem{display:flex;flex-direction:column;align-items:center;padding:.3rem .125rem;cursor:grab;border-radius:.5rem;margin-bottom:1px;border:0.5px solid transparent;user-select:none;transition:background .1s;}
.pitem:hover{background:#ffffff;border-color:rgba(0,0,0,0.15);}
.gwrap{flex:1;overflow:auto;}
.bhead{display:flex;align-items:center;position:sticky;top:0;background:#ffffff;z-index:10;border-bottom:1px solid rgba(0,0,0,0.3);}
.trow{display:flex;align-items:stretch;border-bottom:0.5px solid rgba(0,0,0,0.15);min-height:4.25rem;transition:opacity .15s;}
.tlabel{width:8.75rem;min-width:8.75rem;display:flex;align-items:center;gap:.375rem;padding:0 .5rem;border-right:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;}
.cell{min-width:2.5rem;width:2.5rem;display:flex;align-items:center;justify-content:center;transition:background .08s;position:relative;}
.sbar{padding:.3rem .75rem;border-top:0.5px solid rgba(0,0,0,0.15);font-size:.6875rem;color:#888780;display:flex;gap:1rem;flex-wrap:wrap;}

/* Picto Texte — T noir sur fond blanc avec bordure */
.texte-picto-panel{width:1.625rem;height:1.625rem;display:flex;align-items:center;justify-content:center;border-radius:.3rem;background:#ffffff;border:1.5px solid #1a1a18;color:#1a1a18;font-family:'Nunito',system-ui;font-weight:800;font-size:.9375rem;pointer-events:none;flex-shrink:0;}

/* Logo icône inline */
.logo-icon{width:1.75rem;height:1.75rem;border-radius:.4375rem;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>

<script>
/* ── Scaling adaptatif + zoom manuel ── */
window._zoom = 1.0;          // facteur zoom utilisateur (1 = neutre)
var _BASE_WIDTH = 1280;
var _MIN_SCALE  = 0.5;
var _MAX_SCALE  = 2.0;
var _BASE_SIZE  = 20;        // taille de base augmentée pour une grille plus grande au lancement

function applyScale(){
  var w = window.innerWidth;
  var autoRatio = Math.min(Math.max(w / _BASE_WIDTH, 0.7), 1.3);
  var finalSize = _BASE_SIZE * autoRatio * window._zoom;
  finalSize = Math.min(Math.max(finalSize, _BASE_SIZE * _MIN_SCALE), _BASE_SIZE * _MAX_SCALE);
  document.documentElement.style.fontSize = finalSize + 'px';
  // Mettre à jour l'affichage du % dans la toolbar
  var lbl = document.getElementById('zoom-pct');
  if(lbl) lbl.textContent = Math.round(window._zoom * 100) + '%';
}

applyScale();
window.addEventListener('resize', applyScale);
</script>
